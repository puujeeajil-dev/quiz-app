<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтан Хонх — Тоглох</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: swing 2s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f4a261;
            box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f4a261 0%, #e76f51 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(244, 162, 97, 0.3);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .waiting-screen, .game-screen {
            display: none;
        }

        .waiting-screen {
            padding: 20px;
        }

        .emoji {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .participant-count {
            font-size: 48px;
            font-weight: bold;
            color: #f4a261;
            margin: 20px 0;
        }

        .question-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .question-text {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 30px;
        }

        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #e76f51;
            margin: 20px 0;
        }

        .points {
            color: #f4a261;
            font-weight: 600;
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .answer-btn {
            padding: 20px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover:not(.disabled) {
            border-color: #f4a261;
            background: #fff8f0;
            transform: translateX(5px);
        }

        .answer-btn.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .answer-btn.correct {
            border-color: #2ecc71;
            background: #eafaf1;
        }

        .answer-btn.wrong {
            border-color: #e74c3c;
            background: #fadbd8;
        }

        .feedback {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
        }

        .feedback.correct {
            background: #eafaf1;
            color: #2ecc71;
        }

        .feedback.wrong {
            background: #fadbd8;
            color: #e74c3c;
        }

        .score-display {
            font-size: 36px;
            font-weight: bold;
            color: #1e3c72;
            margin: 20px 0;
        }

        .leaderboard {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .leaderboard h3 {
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .rank-item:last-child {
            border-bottom: none;
        }

        .rank-position {
            font-weight: bold;
            color: #f4a261;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Нэвтрэх хэсэг -->
        <div id="loginScreen">
            <div class="icon">🔔</div>
            <h1>Алтан Хонх</h1>
            <p class="subtitle">Тэмцээнд нэвтрэх</p>
            
            <div class="form-group">
                <label for="pinCode">PIN КОД</label>
                <input type="text" id="pinCode" placeholder="4684" required>
            </div>
            
            <div class="form-group">
                <label for="playerName">ТАНЫ НЭР</label>
                <input type="text" id="playerName" placeholder="Пүүжээ" required>
            </div>
            
            <div class="form-group">
                <label for="teamName">БАГИЙН НЭР (ЗААВАЛ БИШ)</label>
                <input type="text" id="teamName" placeholder="Xxүг">
            </div>
            
            <button class="btn" onclick="joinGame()">Нэвтрэх →</button>
            
            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- Хүлээх хэсэг -->
        <div id="waitingScreen" class="waiting-screen">
            <div class="emoji">😊</div>
            <h2>Тэмцээн эхлэхийг хүлээж байна...</h2>
            <div class="participant-count" id="participantCount">0</div>
            <p>оролцогч нэвтэрсэн</p>
        </div>

        <!-- Тоглох хэсэг -->
        <div id="gameScreen" class="game-screen">
            <div class="question-container">
                <div class="question-header">
                    <span id="questionNumber">1/10</span>
                    <span class="points" id="questionPoints">200 оноо</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="timer" id="timer">20</div>
                <div class="answers" id="answersContainer"></div>
                <div class="feedback" id="feedback" style="display: none;"></div>
            </div>
            
            <div class="score-display">
                <div>🏆</div>
                <div id="currentRank">#1</div>
                <div id="playerScore">0 оноо</div>
            </div>

            <div class="leaderboard" id="leaderboard">
                <h3>Онооны самбар</h3>
                <div id="rankingList"></div>
            </div>
        </div>
    </div>

    <script>
        // LocalStorage key
        const STORAGE_KEY = 'quizGameState';
        
        // Тоглогчийн мэдээлэл
        let playerData = {
            pin: '',
            name: '',
            team: '',
            score: 0,
            answeredQuestions: []
        };

        // Тоглоомын төлөв
        let gameState = {
            isActive: false,
            currentQuestion: null,
            participants: [],
            timeLeft: 0
        };

        // LocalStorage-аас өгөгдөл унших
        function loadGameState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    gameState = data.gameState || gameState;
                    
                    // Хэрэв тоглогч нэвтэрсэн бол
                    const savedPlayer = data.players?.find(p => p.name === playerData.name);
                    if (savedPlayer) {
                        playerData = savedPlayer;
                    }
                }
            } catch (e) {
                console.error('Error loading state:', e);
            }
        }

        // LocalStorage-д хадгалах
        function saveGameState() {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                
                // Тоглогчийн мэдээллийг шинэчлэх
                if (!data.players) data.players = [];
                const playerIndex = data.players.findIndex(p => p.name === playerData.name);
                if (playerIndex >= 0) {
                    data.players[playerIndex] = playerData;
                } else {
                    data.players.push(playerData);
                }
                
                data.gameState = gameState;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('Error saving state:', e);
            }
        }

        // Нэвтрэх
        function joinGame() {
            const pin = document.getElementById('pinCode').value.trim();
            const name = document.getElementById('playerName').value.trim();
            const team = document.getElementById('teamName').value.trim();
            
            if (!pin || !name) {
                showError('PIN код болон нэрээ оруулна уу!');
                return;
            }
            
            // Тоглогчийн мэдээлэл хадгалах
            playerData.pin = pin;
            playerData.name = name;
            playerData.team = team;
            playerData.score = 0;
            playerData.answeredQuestions = [];
            
            // Оролцогчдын жагсаалтанд нэмэх
            if (!gameState.participants.find(p => p.name === name)) {
                gameState.participants.push({
                    name: name,
                    team: team,
                    score: 0
                });
            }
            
            saveGameState();
            
            // Хүлээх дэлгэцрүү шилжих
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('waitingScreen').style.display = 'block';
            updateParticipantCount();
            
            // Хэрэв тоглоом эхэлсэн бол шууд тоглох дэлгэцрүү шилжих
            checkGameStatus();
        }

        // Алдааны мэдээлэл харуулах
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Оролцогчдын тоо шинэчлэх
        function updateParticipantCount() {
            document.getElementById('participantCount').textContent = gameState.participants.length;
        }

        // Тоглоомын төлөв шалгах
        function checkGameStatus() {
            loadGameState();
            
            if (gameState.isActive && gameState.currentQuestion) {
                showGameScreen();
            }
        }

        // Тоглох дэлгэц харуулах
        function showGameScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            displayQuestion();
            updateScoreDisplay();
        }

        // Асуулт харуулах
        function displayQuestion() {
            if (!gameState.currentQuestion) return;
            
            const q = gameState.currentQuestion;
            document.getElementById('questionNumber').textContent = `${q.number}/10`;
            document.getElementById('questionPoints').textContent = `${q.points} оноо`;
            document.getElementById('questionText').textContent = q.text;
            
            // Хариултууд харуулах
            const answersContainer = document.getElementById('answersContainer');
            answersContainer.innerHTML = '';
            
            ['A', 'B', 'C', 'D'].forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = `${option}. ${q.answers[option] || ''}`;
                btn.onclick = () => submitAnswer(option);
                answersContainer.appendChild(btn);
            });
            
            // Цаг тоолох эхлүүлэх
            startTimer(q.timeLimit || 20);
        }

        // Цаг тоолох
        let timerInterval;
        function startTimer(seconds) {
            let timeLeft = seconds;
            document.getElementById('timer').textContent = timeLeft;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    disableAnswers();
                }
            }, 1000);
        }

        // Хариулт илгээх
        function submitAnswer(selectedOption) {
            const q = gameState.currentQuestion;
            if (!q || playerData.answeredQuestions.includes(q.id)) return;
            
            playerData.answeredQuestions.push(q.id);
            disableAnswers();
            clearInterval(timerInterval);
            
            // Зөв эсэхийг шалгах
            const isCorrect = selectedOption === q.correctAnswer;
            
            // Оноо нэмэх
            if (isCorrect) {
                playerData.score += q.points;
                showFeedback(true);
            } else {
                showFeedback(false);
            }
            
            // Хариултад өнгө өгөх
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => {
                const option = btn.textContent.charAt(0);
                if (option === q.correctAnswer) {
                    btn.classList.add('correct');
                } else if (option === selectedOption && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
            
            saveGameState();
            updateScoreDisplay();
            
            // 3 секундын дараа дараагийн асуулт руу шилжих
            setTimeout(() => {
                checkForNextQuestion();
            }, 3000);
        }

        // Хариултуудыг идэвхгүй болгох
        function disableAnswers() {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => {
                btn.classList.add('disabled');
                btn.onclick = null;
            });
        }

        // Санал хүсэлт харуулах
        function showFeedback(isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            if (isCorrect) {
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ Зөв хариулт!';
            } else {
                feedback.className = 'feedback wrong';
                feedback.textContent = '❌ Буруу хариулт';
            }
        }

        // Оноо харуулах
        function updateScoreDisplay() {
            document.getElementById('playerScore').textContent = `${playerData.score} оноо`;
            
            // Ranking харуулах
            const sortedPlayers = gameState.participants
                .sort((a, b) => (b.score || 0) - (a.score || 0));
            
            const playerRank = sortedPlayers.findIndex(p => p.name === playerData.name) + 1;
            document.getElementById('currentRank').textContent = `#${playerRank}`;
            
            // Leaderboard шинэчлэх
            const rankingList = document.getElementById('rankingList');
            rankingList.innerHTML = sortedPlayers.slice(0, 5).map((p, i) => `
                <div class="rank-item">
                    <span><span class="rank-position">#${i + 1}</span> ${p.name}${p.team ? ` (${p.team})` : ''}</span>
                    <span>${p.score || 0} оноо</span>
                </div>
            `).join('');
        }

        // Дараагийн асуулт шалгах
        function checkForNextQuestion() {
            loadGameState();
            
            if (gameState.currentQuestion) {
                document.getElementById('feedback').style.display = 'none';
                displayQuestion();
            }
        }

        // 2 секунд тутамд төлөв шалгах
        setInterval(() => {
            if (document.getElementById('waitingScreen').style.display === 'block' ||
                document.getElementById('gameScreen').style.display === 'block') {
                checkGameStatus();
                updateParticipantCount();
            }
        }, 2000);

        // Хуудас ачааллагдахад
        window.onload = function() {
            loadGameState();
        };
    </script>
</body>
</html>
