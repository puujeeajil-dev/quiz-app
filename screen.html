<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алтан Хонх — Дэлгэц</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0f0c29;color:#fff;min-height:100vh;overflow:hidden;}

/* WAITING */
#screenWaiting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);}
.logo-big{font-size:80px;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-15px);}}
.title-big{font-size:52px;font-weight:700;color:#f59e0b;margin:16px 0 8px;text-shadow:0 0 30px rgba(245,158,11,.5);}
.subtitle{color:#94a3b8;font-size:18px;margin-bottom:40px;}
.pin-box{background:rgba(245,158,11,.1);border:3px solid #f59e0b;border-radius:20px;padding:24px 50px;text-align:center;margin-bottom:30px;}
.pin-label{font-size:16px;color:#94a3b8;margin-bottom:8px;}
.pin-number{font-size:72px;font-weight:700;color:#f59e0b;letter-spacing:16px;}
.join-url{font-size:20px;color:#fff;background:rgba(255,255,255,.08);padding:12px 28px;border-radius:12px;margin-bottom:30px;}
.players-waiting{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:900px;}
.pw-chip{background:rgba(245,158,11,.15);border:2px solid rgba(245,158,11,.4);border-radius:30px;padding:10px 20px;font-size:16px;color:#f59e0b;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.player-count{font-size:18px;color:#94a3b8;margin-bottom:16px;}

/* QUESTION */
#screenQuestion{display:none;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#1a1740);}
.q-header{background:rgba(245,158,11,.1);border-bottom:2px solid rgba(245,158,11,.3);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;}
.q-progress{font-size:18px;font-weight:700;color:#f59e0b;}
.q-timer{width:70px;height:70px;border-radius:50%;background:rgba(245,158,11,.15);border:3px solid #f59e0b;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#f59e0b;transition:.3s;}
.q-timer.warning{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.15);}
.q-timer.danger{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.3);animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.q-points{font-size:18px;color:#94a3b8;}
.q-body{padding:30px 50px;}
.q-number{font-size:16px;color:#f59e0b;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:2px;}
.q-text{font-size:32px;font-weight:700;line-height:1.4;margin-bottom:30px;text-align:center;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1000px;margin:0 auto;}
.option-card{border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px;font-size:20px;font-weight:600;cursor:default;transition:.3s;border:3px solid transparent;}
.opt-a{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);}
.opt-b{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4);}
.opt-c{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);}
.opt-d{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.4);}
.opt-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;}
.opt-a .opt-icon{background:#ef4444;}
.opt-b .opt-icon{background:#3b82f6;}
.opt-c .opt-icon{background:#10b981;}
.opt-d .opt-icon{background:#f59e0b;color:#000;}
.option-card.correct{transform:scale(1.03);box-shadow:0 0 30px rgba(16,185,129,.5);}
.option-card.correct.opt-a{background:rgba(16,185,129,.3);border-color:#10b981;}
.option-card.correct.opt-b{background:rgba(16,185,129,.3);border-color:#10b981;}
.option-card.correct.opt-c{background:rgba(16,185,129,.3);border-color:#10b981;}
.option-card.correct.opt-d{background:rgba(16,185,129,.3);border-color:#10b981;}
.answer-bar{margin-top:24px;display:flex;gap:12px;justify-content:center;max-width:1000px;margin:24px auto 0;}
.ans-stat{text-align:center;flex:1;}
.ans-bar-wrap{background:rgba(255,255,255,.08);border-radius:8px;height:60px;display:flex;align-items:flex-end;overflow:hidden;margin-bottom:6px;}
.ans-bar-fill{border-radius:8px;transition:height 1s ease;min-height:4px;}
.ans-count{font-size:14px;color:#94a3b8;}

/* ANSWER REVEAL */
#screenAnswer{display:none;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#1a1740);align-items:center;justify-content:center;flex-direction:column;padding:40px;}
.answer-reveal{text-align:center;}
.answer-reveal .correct-label{font-size:20px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:3px;}
.answer-reveal .correct-text{font-size:42px;font-weight:700;color:#10b981;margin-bottom:30px;text-shadow:0 0 30px rgba(16,185,129,.5);}
.scoreboard-mini{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.score-chip{background:rgba(245,158,11,.1);border:2px solid rgba(245,158,11,.3);border-radius:14px;padding:14px 20px;text-align:center;min-width:130px;}
.score-chip .name{font-size:14px;color:#94a3b8;margin-bottom:4px;}
.score-chip .score{font-size:28px;font-weight:700;color:#f59e0b;}
.score-chip.top1{border-color:#f59e0b;background:rgba(245,158,11,.2);}

/* FINAL */
#screenFinal{display:none;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63);align-items:center;justify-content:center;flex-direction:column;}
.final-title{font-size:52px;font-weight:700;color:#f59e0b;margin-bottom:30px;text-align:center;}
.podium{display:flex;align-items:flex-end;gap:20px;margin-bottom:30px;}
.podium-item{text-align:center;}
.podium-name{font-size:16px;font-weight:700;margin-bottom:8px;color:#fff;}
.podium-score{font-size:14px;color:#f59e0b;margin-bottom:8px;}
.podium-block{border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;font-size:36px;}
.p1{width:160px;height:180px;background:linear-gradient(135deg,#f59e0b,#d97706);}
.p2{width:130px;height:130px;background:linear-gradient(135deg,#94a3b8,#64748b);}
.p3{width:110px;height:90px;background:linear-gradient(135deg,#b45309,#92400e);}
</style>
</head>
<body>

<!-- WAITING -->
<div id="screenWaiting">
  <div class="logo-big">🔔</div>
  <div class="title-big">Алтан Хонх</div>
  <div class="subtitle">Тэмцээнд тавтай морилно уу!</div>
  <div class="pin-box">
    <div class="pin-label">Нэвтрэх PIN код</div>
    <div class="pin-number" id="pinDisplay">----</div>
  </div>
  <div class="join-url" id="joinUrl">play.html руу орж PIN оруулна уу</div>
  <div class="player-count" id="playerCountDisplay">Оролцогч хүлээж байна...</div>
  <div class="players-waiting" id="playersWaiting"></div>
</div>

<!-- QUESTION -->
<div id="screenQuestion">
  <div class="q-header">
    <div class="q-progress" id="qProgress">1 / 10</div>
    <div class="q-timer" id="qTimer">20</div>
    <div class="q-points" id="qPointsDisplay">200 оноо</div>
  </div>
  <div class="q-body">
    <div class="q-number" id="qNumber">Асуулт 1</div>
    <div class="q-text" id="qText">Асуулт энд харагдана</div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="answer-bar" id="answerBar"></div>
  </div>
</div>

<!-- ANSWER REVEAL -->
<div id="screenAnswer" style="display:none;flex-direction:column;">
  <div class="answer-reveal">
    <div class="correct-label">Зөв хариулт</div>
    <div class="correct-text" id="correctText"></div>
  </div>
  <div class="scoreboard-mini" id="scoreboardMini"></div>
</div>

<!-- FINAL -->
<div id="screenFinal" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
  <div class="final-title">🏆 Тэмцээн дууслаа!</div>
  <div class="podium" id="podium"></div>
  <div id="fullRanking"></div>
</div>

<script>
var DB={questions:[],game:{status:'idle',currentQ:-1,pin:'',players:[],answers:{}},results:[]};
var timerInterval=null;
var timeLeft=0;
var currentStatus='';

function loadDB(){var d=localStorage.getItem('altankhonkh');if(d)DB=JSON.parse(d);}

function showScreen(id){
  ['screenWaiting','screenQuestion','screenAnswer','screenFinal'].forEach(function(s){
    var el=document.getElementById(s);
    el.style.display='none';
  });
  var target=document.getElementById(id);
  if(id==='screenAnswer'||id==='screenFinal'){target.style.display='flex';}
  else{target.style.display=id==='screenWaiting'?'flex':'block';}
}

function update(){
  loadDB();
  var game=DB.game;

  if(game.status==='idle'){
    if(currentStatus!=='idle'){currentStatus='idle';showScreen('screenWaiting');document.getElementById('pinDisplay').textContent='----';}
    return;
  }

  if(game.status==='waiting'){
    if(currentStatus!=='waiting'){currentStatus='waiting';showScreen('screenWaiting');}
    document.getElementById('pinDisplay').textContent=game.pin;
    document.getElementById('joinUrl').innerHTML='<strong style="color:#f59e0b;">'+window.location.origin+'/play.html</strong> — PIN: <strong style="color:#f59e0b;">'+game.pin+'</strong>';
    document.getElementById('playerCountDisplay').textContent=game.players.length+' оролцогч нэвтэрсэн';
    document.getElementById('playersWaiting').innerHTML=game.players.map(function(p){return '<div class="pw-chip">'+p.name+(p.team?' ('+p.team+')':'')+'</div>';}).join('');
    return;
  }

  if(game.status==='playing'){
    var q=DB.questions[game.currentQ];
    if(!q)return;
    var qKey=game.currentQ;

    if(currentStatus!=='playing_'+qKey){
      currentStatus='playing_'+qKey;
      showScreen('screenQuestion');
      clearInterval(timerInterval);
      timeLeft=q.time;

      document.getElementById('qProgress').textContent=(game.currentQ+1)+' / '+DB.questions.length;
      document.getElementById('qNumber').textContent='Асуулт '+(game.currentQ+1);
      document.getElementById('qText').textContent=q.text;
      document.getElementById('qPointsDisplay').textContent=q.points+' оноо';

      var grid=document.getElementById('optionsGrid');
      grid.innerHTML=['A','B','C','D'].map(function(o){
        return '<div class="option-card opt-'+o.toLowerCase()+'">'+
          '<div class="opt-icon">'+o+'</div>'+
          '<div>'+q.options[o]+'</div></div>';
      }).join('');

      document.getElementById('answerBar').innerHTML='';

      timerInterval=setInterval(function(){
        timeLeft--;
        var timerEl=document.getElementById('qTimer');
        timerEl.textContent=timeLeft;
        if(timeLeft<=5)timerEl.className='q-timer danger';
        else if(timeLeft<=10)timerEl.className='q-timer warning';
        else timerEl.className='q-timer';

        // Update answer stats
        var answers=DB.game.answers[game.currentQ]||{};
        var counts={A:0,B:0,C:0,D:0};
        Object.values(answers).forEach(function(a){if(a&&a.answer)counts[a.answer]++;});
        var total=Object.values(counts).reduce(function(a,b){return a+b;},0)||1;
        var colors={A:'#ef4444',B:'#3b82f6',C:'#10b981',D:'#f59e0b'};
        document.getElementById('answerBar').innerHTML=['A','B','C','D'].map(function(o){
          var pct=Math.round(counts[o]/total*100);
          return '<div class="ans-stat">'+
            '<div class="ans-bar-wrap"><div class="ans-bar-fill" style="width:100%;height:'+pct+'%;background:'+colors[o]+';"></div></div>'+
            '<div style="font-size:20px;font-weight:700;color:'+colors[o]+';">'+counts[o]+'</div>'+
            '<div class="ans-count">'+o+'</div></div>';
        }).join('');

        if(timeLeft<=0)clearInterval(timerInterval);
      },1000);
    }
    return;
  }

  if(game.status==='show_answer'){
    if(currentStatus!=='show_answer_'+game.currentQ){
      currentStatus='show_answer_'+game.currentQ;
      clearInterval(timerInterval);
      var q2=DB.questions[game.currentQ];
      showScreen('screenAnswer');

      // Highlight correct option
      document.getElementById('correctText').textContent=q2.correct+': '+q2.options[q2.correct];

      // Top scorers
      var sorted=game.players.slice().sort(function(a,b){return (b.score||0)-(a.score||0);});
      document.getElementById('scoreboardMini').innerHTML=sorted.slice(0,5).map(function(p,i){
        return '<div class="score-chip'+(i===0?' top1':'')+'">'+
          '<div class="name">'+(i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'')+p.name+'</div>'+
          '<div class="score">'+(p.score||0)+'</div></div>';
      }).join('');
    }
    return;
  }

  if(game.status==='finished'){
    if(currentStatus!=='finished'){
      currentStatus='finished';
      clearInterval(timerInterval);
      showScreen('screenFinal');
      var results=DB.results.slice().sort(function(a,b){return (b.score||0)-(a.score||0);});

      // Podium
      var p1=results[0],p2=results[1],p3=results[2];
      document.getElementById('podium').innerHTML=
        (p2?'<div class="podium-item"><div class="podium-name">'+p2.name+'</div><div class="podium-score">'+(p2.score||0)+'</div><div class="podium-block p2">🥈</div></div>':'')+
        (p1?'<div class="podium-item"><div class="podium-name">'+p1.name+'</div><div class="podium-score">'+(p1.score||0)+'</div><div class="podium-block p1">🥇</div></div>':'')+
        (p3?'<div class="podium-item"><div class="podium-name">'+p3.name+'</div><div class="podium-score">'+(p3.score||0)+'</div><div class="podium-block p3">🥉</div></div>':'');

      // Full ranking
      document.getElementById('fullRanking').innerHTML=
        '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:900px;">'+
        results.map(function(p,i){
          return '<div style="background:rgba(255,255,255,.06);border-radius:10px;padding:10px 16px;text-align:center;min-width:100px;">'+
            '<div style="font-size:12px;color:#94a3b8;">'+(i+1)+' байр</div>'+
            '<div style="font-size:15px;font-weight:700;">'+p.name+'</div>'+
            '<div style="font-size:18px;color:#f59e0b;font-weight:700;">'+(p.score||0)+'</div></div>';
        }).join('')+'</div>';
    }
    return;
  }
}

// Auto update every 1 second
setInterval(update,1000);
update();
</script>
</body>
</html>
